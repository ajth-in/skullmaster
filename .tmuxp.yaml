session_name: skullmaster
start_directory: ./

windows:
  - window_name: dev_servers
    layout: tiled
    panes:
      - pnpm run dev
      - cd apps/demo && pnpm skullmaster serve
      - opencode .

  - window_name: editor
    focus: true
    panes:
      - nvim .

  - window_name: workspace
    layout: main-vertical
    focus: true
    panes:
      - lazygit
      -
